services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${PLATFORM_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${PLATFORM_DB_PASSWORD}
    ports:
      - "${PLATFORM_MYSQL_HOST_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    command: redis-server --requirepass ${PLATFORM_REDIS_PASSWORD} --appendonly yes
    ports:
      - "${PLATFORM_REDIS_HOST_PORT}:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY}
    ports:
      - "${PLATFORM_MINIO_API_HOST_PORT}:9000"
      - "${PLATFORM_MINIO_CONSOLE_HOST_PORT}:9001"
    volumes:
      - minio-data:/data

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${PLATFORM_LOKI_HOST_PORT}:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${PLATFORM_GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${PLATFORM_GRAFANA_ADMIN_PASSWORD}
    ports:
      - "${PLATFORM_GRAFANA_HOST_PORT}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - loki

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PLATFORM_SERVER_PORT: ${PLATFORM_SERVER_HOST_PORT}
    ports:
      - "${PLATFORM_SERVER_HOST_PORT}:${PLATFORM_SERVER_HOST_PORT}"
    depends_on:
      - mysql
      - redis
      - minio

  web:
    build:
      context: ./project
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PLATFORM_WEB_HOST_PORT}:80"
    depends_on:
      - server

volumes:
  grafana-data:
  loki-data:
  mysql-data:
  minio-data:
  redis-data:
