# 默认环境基础配置，包含本地开发所需的数据库、上传、认证、第三方接口与 HTTPS 设置。
spring:
  application:
    name: interview_agent
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/,file:${app.file.root}/
  datasource:
    url: jdbc:mysql://localhost:3306/interview_agent
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  graphql:
    path: /graphql
  ai:
    deepseek:
      api-key: 
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-handlers-package: com.multimodal.interview.util

jwt:
  secret: xQ7$pL9@rT2!sH4%kM6*fG8&dJ0^vB3#nZ5$mY7
  expiration: 604800000

server:
  port: 8442
  ssl:
    enabled: true
    key-store: classpath:springboot-local.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: 1

xunfei:
  appid: d41f8f2c
  api-key: 91ff9402ea218f8c8cb7e92e292eb768
  api-secret: YWRiZjdlMjkyMmM3ZWM0Y2Y3OTk1YmU5
  tts:
    host-url: https://tts-api.xfyun.cn/v2/tts
    tte: UTF8
    vcn: x4_yezi
    pitch: 50
