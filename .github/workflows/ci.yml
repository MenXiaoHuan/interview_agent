name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Backend tests
        working-directory: backend
        env:
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: '6379'
          SPRING_DATA_REDIS_DATABASE: '0'
          PLATFORM_MINIO_ENDPOINT: http://localhost:9000
          PLATFORM_MINIO_INTERNAL_ENDPOINT: http://localhost:9000
          PLATFORM_MINIO_ACCESS_KEY: ci-minio-access-key
          PLATFORM_MINIO_SECRET_KEY: ci-minio-secret-key
          PLATFORM_STORAGE_BUCKET: interview-agent
        run: ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: project/package-lock.json
      - name: Install
        working-directory: project
        run: npm ci
      - name: Lint
        working-directory: project
        run: npm run lint
      - name: Test
        working-directory: project
        run: npm test
      - name: Build
        working-directory: project
        run: npm run build:h5

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan obvious committed secrets
        run: |
          ! grep -R "sk-[a-zA-Z0-9]\{20,\}\|PLATFORM_JWT_SECRET:.*[!@#$]" . --exclude-dir=.git --exclude-dir=node_modules
