services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${PLATFORM_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${PLATFORM_DB_PASSWORD}
    ports:
      - "${PLATFORM_MYSQL_HOST_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/sql/interview_agent.sql:/docker-entrypoint-initdb.d/01-interview-agent.sql:ro

  redis:
    image: redis:7
    command: redis-server --requirepass ${PLATFORM_REDIS_PASSWORD}
    ports:
      - "${PLATFORM_REDIS_HOST_PORT}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY}
    ports:
      - "${PLATFORM_MINIO_API_HOST_PORT}:9000"
      - "${PLATFORM_MINIO_CONSOLE_HOST_PORT}:9001"
    volumes:
      - minio-data:/data

  server:
    image: eclipse-temurin:17
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: ./mvnw spring-boot:run
    environment:
      PLATFORM_SERVER_PORT: ${PLATFORM_SERVER_HOST_PORT}
    ports:
      - "${PLATFORM_SERVER_HOST_PORT}:${PLATFORM_SERVER_HOST_PORT}"
    depends_on:
      - mysql
      - redis
      - minio

  web:
    image: node:20
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./project:/app
    command: sh -c "npm install && npm run dev:h5 -- --host 0.0.0.0 --port ${PLATFORM_WEB_HOST_PORT}"
    ports:
      - "${PLATFORM_WEB_HOST_PORT}:${PLATFORM_WEB_HOST_PORT}"
    depends_on:
      - server

volumes:
  mysql-data:
  minio-data:
